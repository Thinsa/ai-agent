spring:
  config:
    import: optional:classpath:application-local.yml
  application:
    name: yun-ai-agent
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: ${ALIYUN_OSS_MAX_AVATAR_SIZE_BYTES:5MB}
      max-request-size: ${ALIYUN_OSS_MAX_AVATAR_SIZE_BYTES:5MB}
  ai:
    model:
      chat: openai
      embedding: dashscope
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      embedding:
        enabled: true
    openai:
      api-key: ${OPENAI_API_KEY:${DASHSCOPE_API_KEY:}}
      base-url: ${OPENAI_BASE_URL}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL}
      embedding:
        options:
          model: text-embedding-3-small
    ollama:
      base-url: http://localhost:11434
      chat:
        model: gemma3:1b
    mcp:
      client:
        enabled: ${APP_MCP_CLIENT_ENABLED:false}
        sse:
          connections:
            image-search:
              url: ${APP_MCP_IMAGE_SEARCH_URL:http://localhost:8127}
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        max-document-batch-size: 10000

server:
  port: 8123
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.yun.yunaiagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

search-api:
  api-key: ${SEARCH_API_API_KEY:}

dashscope:
  image:
    model: ${DASHSCOPE_IMAGE_MODEL:qwen-image-2.0-pro}
    size: ${DASHSCOPE_IMAGE_SIZE:1024*1024}
    negative-prompt: ${DASHSCOPE_IMAGE_NEGATIVE_PROMPT:}
    api-url: ${DASHSCOPE_IMAGE_API_URL:https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation}
    watermark: ${DASHSCOPE_IMAGE_WATERMARK:false}
    prompt-extend: ${DASHSCOPE_IMAGE_PROMPT_EXTEND:true}

aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:}
    bucket: ${ALIYUN_OSS_BUCKET:}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:${OSS_ACCESS_KEY_ID:${KEYID:}}}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:${OSS_ACCESS_KEY_SECRET:${KEYSECRET:}}}
    public-base-url: ${ALIYUN_OSS_PUBLIC_BASE_URL:}
    avatar-dir: ${ALIYUN_OSS_AVATAR_DIR:avatars}
    max-avatar-size-bytes: ${ALIYUN_OSS_MAX_AVATAR_SIZE_BYTES:5242880}

app:
  jwt:
    secret: ${APP_JWT_SECRET:}
    expiration: ${APP_JWT_EXPIRATION}
  tools:
    workspace: ${APP_TOOLS_WORKSPACE:${user.dir}}
    command-timeout-seconds: ${APP_TOOLS_COMMAND_TIMEOUT_SECONDS}
    max-output-chars: ${APP_TOOLS_MAX_OUTPUT_CHARS}

logging:
  level:
    org.springframework.ai: INFO
